name: Deploy Express App to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'src/express/**'

permissions:
  id-token: write 
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }} 
          aws-region: eu-central-1
        
      - name: Check AWS Caller Identity
        run: aws sts get-caller-identity

      
      - name: Inject Variables into HTML Template
        env:
          COGNITO_DOMAIN: ${{ vars.COGNITO_DOMAIN }}
          COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          HTML_FILE="src/express/public/api-form-with-authentication-hostedUI.html"
          envsubst '${COGNITO_DOMAIN} ${COGNITO_CLIENT_ID} ${API_BASE_URL} ${EC2_HOST}' < $HTML_FILE > temp.html && mv temp.html $HTML_FILE

      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "src/express/*"
          target: "/var/www/app"
          strip_components: 2 

      - name: Install dependencies and restart PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /var/www/app
            npm install
            pm2 start app.js --name "car-prices-api" || pm2 restart "car-prices-api"
            pm2 save